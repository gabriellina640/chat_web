<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Trabalho - Chat e Fila</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background-color: #f4f4f9; }
        .hidden { display: none !important; }
        .box { background: white; border: 1px solid #ccc; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* ESTILOS DO CHAT TIPO WHATSAPP */
        #chat-box { 
            height: 350px; 
            border: 1px solid #ddd; 
            overflow-y: scroll; 
            padding: 15px; 
            margin-bottom: 10px; 
            background: #e5ddd5; 
            border-radius: 4px;
            display: flex;
            flex-direction: column;
        }

        .msg-bubble {
            max-width: 75%;
            padding: 8px 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            position: relative;
            word-wrap: break-word;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        .msg-sent {
            align-self: flex-end;
            background-color: #dcf8c6; 
            border-top-right-radius: 0;
        }

        .msg-received {
            align-self: flex-start;
            background-color: #ffffff; 
            border-top-left-radius: 0;
        }

        .msg-author {
            font-size: 0.8em;
            font-weight: bold;
            color: #075e54;
            margin-bottom: 4px;
            display: block;
        }

        /* ESTILOS GERAIS */
        input { padding: 10px; margin: 5px 0; width: calc(100% - 22px); border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; cursor: pointer; background: #0066cc; color: white; border: none; border-radius: 4px; font-weight: bold; width: 100%; margin-top: 5px; }
        button:hover { background: #0055aa; }
        .btn-secondary { background: #555; }
        .btn-secondary:hover { background: #333; }
        .btn-danger { background: #cc0000; }
        .btn-danger:hover { background: #aa0000; }
        #auth-msg { text-align: center; font-weight: bold; margin-top: 10px; }
        .chat-input-area { display: flex; gap: 5px; }
        .chat-input-area input { margin: 0; flex-grow: 1; }
        .chat-input-area button { width: auto; margin: 0; }
    </style>
</head>
<body>

    <div id="auth-section" class="box">
        <h2 style="text-align: center;">Sistema de Acesso</h2>
        <input type="text" id="username" placeholder="Nome de usuário">
        <input type="email" id="email" placeholder="E-mail (obrigatório para cadastro)">
        <input type="password" id="password" placeholder="Senha">
        
        <button onclick="login()">Entrar</button>
        <button onclick="register()" class="btn-secondary">Cadastrar</button>
        <p id="auth-msg"></p>
    </div>

    <div id="app-section" class="box hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0;">Olá, <span id="logged-user"></span>!</h2>
            <button onclick="logout()" class="btn-danger" style="width: auto; margin: 0;">Sair</button>
        </div>
        <hr>
        
        <div id="chat-box"></div>
        
        <div class="chat-input-area">
            <input type="text" id="msg-input" placeholder="Digite uma mensagem..." onkeypress="handleEnter(event)">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let currentUser = null;
        const socket = io();

        socket.on('chatMessage', (data) => {
            const chatBox = document.getElementById('chat-box');
            
            const isMe = data.user === currentUser;
            const bubbleClass = isMe ? 'msg-sent' : 'msg-received';
            const authorName = isMe ? '' : `<span class="msg-author">${data.user}</span>`;
            
            chatBox.innerHTML += `
                <div class="msg-bubble ${bubbleClass}">
                    ${authorName}
                    <span>${data.text}</span>
                </div>
            `;
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        async function register() {
            const user = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            if(!user || !email || !pass) {
                document.getElementById('auth-msg').innerText = 'Preencha todos os campos para cadastrar.';
                document.getElementById('auth-msg').style.color = 'red';
                return;
            }

            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, email, password: pass })
            });
            const data = await res.json();
            document.getElementById('auth-msg').innerText = data.message || data.error;
            document.getElementById('auth-msg').style.color = res.ok ? 'green' : 'red';
        }

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if(!user || !pass) {
                document.getElementById('auth-msg').innerText = 'Preencha usuário e senha para logar.';
                document.getElementById('auth-msg').style.color = 'red';
                return;
            }

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await res.json();

            if (res.ok) {
                currentUser = data.username;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('app-section').classList.remove('hidden');
                document.getElementById('logged-user').innerText = currentUser;
                document.getElementById('auth-msg').innerText = '';
            } else {
                document.getElementById('auth-msg').innerText = data.error;
                document.getElementById('auth-msg').style.color = 'red';
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
            document.getElementById('password').value = '';
            document.getElementById('chat-box').innerHTML = '';
        }

        function sendMessage() {
            const msgInput = document.getElementById('msg-input');
            if (msgInput.value.trim() !== '') {
                socket.emit('chatMessage', { user: currentUser, text: msgInput.value });
                msgInput.value = '';
            }
        }

        function handleEnter(e) {
            if(e.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
